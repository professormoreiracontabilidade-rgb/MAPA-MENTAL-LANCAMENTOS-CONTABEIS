<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mental - Lançamentos Contábeis</title>
<style>
:root {
  --navy:#071a3d;
  --navy2:#0d2f66;
  --gold:#f8c93a;
  --gold2:#ffe895;
  --blue:#dcecff;
  --white:#ffffff;
  --dark:#101828;
  --green:#0d8f52;
  --red:#d32032;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(248,201,58,.38), transparent 28%),
    linear-gradient(145deg, #061126 0%, #08275a 55%, #061126 100%);
  color:var(--white);
  min-height:100vh;
  overflow:hidden;
}
.app {
  width:100%;
  max-width:560px;
  height:100vh;
  margin:0 auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.top {
  background:rgba(255,255,255,.08);
  border:3px solid var(--gold);
  border-radius:22px;
  padding:12px;
  text-align:center;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
}
.top .course {
  font-size:13px;
  font-weight:900;
  letter-spacing:.5px;
  color:var(--gold2);
  text-transform:uppercase;
}
.top h1 {
  margin:5px 0 0;
  font-size:25px;
  line-height:1.05;
  text-transform:uppercase;
  color:#fff;
}
.progress-wrap {
  height:14px;
  border-radius:999px;
  background:rgba(255,255,255,.24);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.35);
}
.progress {
  height:100%;
  width:0%;
  background:linear-gradient(90deg, var(--gold), #fff4b5);
  transition:.25s;
}
.card {
  flex:1;
  overflow-y:auto;
  background:linear-gradient(180deg, #ffffff, #f6f9ff);
  color:var(--dark);
  border:4px solid var(--gold);
  border-radius:28px;
  padding:18px;
  box-shadow:0 18px 42px rgba(0,0,0,.46);
}
.badge {
  display:inline-block;
  background:var(--navy);
  color:var(--gold);
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:15px;
  margin-bottom:10px;
}
.card h2 {
  margin:0 0 14px;
  color:var(--navy);
  font-size:29px;
  line-height:1.05;
  text-align:center;
  text-transform:uppercase;
}
.card h3 {
  margin:9px 0 8px;
  font-size:22px;
  color:var(--navy2);
  text-transform:uppercase;
}
.card p, .card li {
  font-size:20px;
  line-height:1.38;
}
.big { font-size:22px !important; }
.mental, .goldbox {
  background:#eef5ff;
  border-left:9px solid var(--navy2);
  border-radius:18px;
  padding:12px;
  margin:11px 0;
  box-shadow:0 5px 14px rgba(16,24,40,.08);
}
.goldbox {
  border-left-color:var(--gold);
  background:#fff9df;
}
.entry {
  background:white;
  border:2px solid #d7e4f7;
  border-radius:13px;
  padding:10px 11px;
  margin:7px 0;
  font-size:22px;
  font-weight:900;
}
.deb {
  color:var(--green);
  font-weight:1000;
}
.cred {
  color:var(--red);
  font-weight:1000;
}
.macete {
  background:linear-gradient(90deg, var(--navy), var(--navy2));
  color:white;
  border:2px solid var(--gold);
  border-radius:16px;
  padding:12px;
  margin:10px 0;
  font-size:21px;
  font-weight:900;
}
table {
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  overflow:hidden;
  border-radius:16px;
  font-size:18px;
}
th {
  background:var(--navy);
  color:var(--gold);
  padding:10px;
}
td {
  background:#f2f7ff;
  padding:10px;
  border-bottom:2px solid #d9e6f7;
  font-weight:800;
}
.final {
  text-align:center;
  padding:25px 8px;
}
.final h2 {
  font-size:32px;
  color:var(--navy);
}
.controls {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:9px;
}
button {
  min-height:58px;
  border:0;
  border-radius:18px;
  background:linear-gradient(180deg, #ffe477, var(--gold));
  color:var(--navy);
  font-size:18px;
  font-weight:1000;
  cursor:pointer;
  box-shadow:0 7px 0 #a77c05;
}
button:active {
  transform:translateY(4px);
  box-shadow:0 3px 0 #a77c05;
}
.info {
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  font-weight:900;
  font-size:14px;
  padding:0 4px;
}
.footer {
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#fff;
  opacity:.95;
}
#printBtn {
  position:fixed;
  top:12px;
  right:12px;
  z-index:10;
  width:auto;
  min-height:auto;
  padding:10px 12px;
  font-size:13px;
  border-radius:12px;
}
@media (max-width:390px){
  .card h2 { font-size:25px; }
  .entry { font-size:20px; }
  .card p, .card li { font-size:18px; }
  button { font-size:16px; }
}
@media print {
  body { background:white; overflow:auto; }
  .app { height:auto; max-width:100%; display:block; }
  .top,.controls,.info,.progress-wrap,.footer,#printBtn { display:none; }
  .card { box-shadow:none; border:2px solid #111; page-break-after:always; overflow:visible; margin-bottom:20px; }
}
</style>
</head>
<body>
<button id="printBtn" onclick="window.print()">🖨️ Imprimir PDF</button>
<div class="app">
  <div class="top">
    <div class="course">Curso de Contabilidade Professor Moreira</div>
    <h1>Mapa Mental Mestre<br>Lançamentos Contábeis</h1>
  </div>
  <div class="progress-wrap"><div class="progress" id="progress"></div></div>
  <div class="card" id="card"></div>
  <div class="controls">
    <button onclick="prevSlide()">⬅️ VOLTAR</button>
    <button onclick="restart()">🔄 REINICIAR</button>
    <button onclick="nextSlide()">PRÓXIMA ➡️</button>
  </div>
  <div class="info">
    <span id="counter"></span>
    <span>FGV • CFC</span>
  </div>
  <div class="footer">Curso de Contabilidade Professor Moreira • WhatsApp (61) 98532-3574</div>
</div>

<script>
const slides = [{"title": "REGRAS DE OURO DOS LANÇAMENTOS", "badge": "Comece por aqui", "body": "\n<div class=\"goldbox\">\n  <h3>ATIVO</h3>\n  <p>⬆ Aumenta → <span class=\"deb\">DÉBITO</span></p>\n  <p>⬇ Diminui → <span class=\"cred\">CRÉDITO</span></p>\n</div>\n<div class=\"goldbox\">\n  <h3>PASSIVO</h3>\n  <p>⬆ Aumenta → <span class=\"cred\">CRÉDITO</span></p>\n  <p>⬇ Diminui → <span class=\"deb\">DÉBITO</span></p>\n</div>\n<div class=\"goldbox\">\n  <h3>PATRIMÔNIO LÍQUIDO</h3>\n  <p>⬆ Aumenta → <span class=\"cred\">CRÉDITO</span></p>\n  <p>⬇ Diminui → <span class=\"deb\">DÉBITO</span></p>\n</div>\n<div class=\"goldbox\">\n  <h3>RECEITAS E DESPESAS</h3>\n  <p>Receitas aumentam → <span class=\"cred\">CRÉDITO</span></p>\n  <p>Despesas aumentam → <span class=\"deb\">DÉBITO</span></p>\n</div>\n"}, {"title": "REGRA DO DINHEIRO", "badge": "Caixa/Banco", "body": "\n<div class=\"mental\">\n  <h3>ENTROU DINHEIRO NA EMPRESA</h3>\n  <p>Vendeu à vista, recebeu cliente, recebeu juros, contratou empréstimo.</p>\n  <div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n</div>\n<div class=\"mental\">\n  <h3>SAIU DINHEIRO DA EMPRESA</h3>\n  <p>Comprou, adquiriu, pagou fornecedor, pagou despesa ou quitou obrigação.</p>\n  <div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div>\n</div>\n"}, {"title": "REGRA DA COMPETÊNCIA", "badge": "Sem dinheiro agora", "body": "\n<p class=\"big\">Quando a questão falar em: <b>reconhecer, apropriar, registrar, provisionar, ajustar ou contabilizar</b>, pode não haver entrada ou saída de dinheiro.</p>\n<div class=\"mental\">\n  <h3>SE FOR DESPESA</h3>\n  <div class=\"entry\"><span class=\"deb\">D</span> – Despesa</div>\n</div>\n<div class=\"mental\">\n  <h3>SE FOR RECEITA</h3>\n  <div class=\"entry\"><span class=\"cred\">C</span> – Receita</div>\n</div>\n"}, {"title": "CAPITAL SOCIAL", "badge": "Constituição", "body": "\n<div class=\"mental\">\n<h3>Subscrição de Capital</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Capital a Integralizar</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Capital Social Subscrito</div>\n<p>Sócios assumem a obrigação de integralizar.</p>\n</div>\n<div class=\"mental\">\n<h3>Integralização em dinheiro</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Capital a Integralizar</div>\n</div>\n<div class=\"mental\">\n<h3>Integralização em bens</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Imóveis / Equipamentos / Terrenos</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Capital a Integralizar</div>\n<p>Registrar pelo valor justo do bem.</p>\n</div>\n"}, {"title": "COMPRAS DE MERCADORIAS", "badge": "Estoque", "body": "\n<div class=\"mental\"><h3>Compra sem impostos</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Estoques</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa/Banco ou Fornecedores</div></div>\n<div class=\"mental\"><h3>Compra com impostos recuperáveis</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Estoques</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – ICMS a Recuperar</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – PIS/COFINS a Recuperar</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa/Banco ou Fornecedores</div></div>\n"}, {"title": "VENDAS DE MERCADORIAS", "badge": "Receita + CMV", "body": "\n<div class=\"mental\"><h3>Venda à vista ou a prazo</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Clientes</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Receita de Vendas</div></div>\n<div class=\"mental\"><h3>Baixa do estoque</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – CMV</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Estoques</div></div>\n<div class=\"mental\"><h3>Venda com impostos</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Impostos sobre Vendas</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Impostos a Recolher</div></div>\n"}, {"title": "VENDA COM JUROS / AVP", "badge": "NBC TG 12", "body": "\n<div class=\"mental\"><h3>Reconhecimento inicial com AVP</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Clientes</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Receita de Serviços</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Juros a Apropriar (AVP)</div>\n<p>Clientes fica pelo valor total. Receita fica pelo valor presente. Juros embutidos ficam a apropriar.</p>\n</div>\n<div class=\"mental\"><h3>Apropriação dos juros pelo decurso do prazo</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Juros a Apropriar (AVP)</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Receita Financeira</div>\n</div>\n<div class=\"macete\">MACETE: Clientes = total | Receita = valor presente | Juros = diferença a apropriar.</div>\n"}, {"title": "SITUAÇÕES CLÁSSICAS DA FGV", "badge": "Entrega x Recebimento", "body": "\n<table>\n<tr><th>Situação</th><th>Débito</th><th>Crédito</th></tr>\n<tr><td>Entregou e recebeu</td><td>Caixa</td><td>Receita</td></tr>\n<tr><td>Entregou e não recebeu</td><td>Duplicatas a Receber</td><td>Receita</td></tr>\n<tr><td>Recebeu e não entregou</td><td>Caixa</td><td>Receita Antecipada</td></tr>\n<tr><td>Faturou, não entregou e não recebeu</td><td>Duplicatas a Receber</td><td>Faturamento para Entrega Futura</td></tr>\n</table>\n"}, {"title": "ADIANTAMENTO A FORNECEDOR", "badge": "Ativo", "body": "\n<div class=\"mental\"><h3>Pagamento antecipado ao fornecedor</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Adiantamento a Fornecedores</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div>\n<p>Representa direito da empresa. Classificação: Ativo Circulante.</p></div>\n<div class=\"mental\"><h3>Recebimento das mercadorias</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Estoques / Mercadorias</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Adiantamento a Fornecedores</div></div>\n"}, {"title": "ADIANTAMENTO DE CLIENTES", "badge": "Passivo", "body": "\n<div class=\"mental\"><h3>Cliente pagou antes da entrega</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Adiantamento de Clientes</div>\n<p>Representa obrigação da empresa. Classificação: Passivo Circulante.</p></div>\n<div class=\"mental\"><h3>Entrega da mercadoria/serviço</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Adiantamento de Clientes</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Receita de Vendas / Serviços</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – CMV</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Estoques</div></div>\n"}, {"title": "DUPLICATAS A RECEBER", "badge": "Clientes", "body": "\n<div class=\"mental\"><h3>Emissão de duplicata</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Duplicatas a Receber</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Receita de Vendas / Serviços</div></div>\n<div class=\"mental\"><h3>Recebimento nominal</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Duplicatas a Receber</div></div>\n<div class=\"mental\"><h3>Recebimento com juros</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Duplicatas a Receber</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Receita de Juros</div></div>\n"}, {"title": "RECEBIMENTO COM DESCONTO", "badge": "Desconto concedido", "body": "\n<div class=\"mental\">\n<h3>Cliente paga com desconto</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – Desconto Concedido / Despesa Financeira</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Duplicatas a Receber / Clientes</div>\n<p>Para quem recebe menos, o desconto é despesa.</p>\n</div>\n"}, {"title": "DUPLICATAS A PAGAR", "badge": "Fornecedores", "body": "\n<div class=\"mental\"><h3>Pagamento nominal</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Duplicatas a Pagar</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div></div>\n<div class=\"mental\"><h3>Pagamento com juros</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Duplicatas a Pagar</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa de Juros</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div></div>\n<div class=\"mental\"><h3>Pagamento com desconto obtido</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Duplicatas a Pagar</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Receita de Desconto Obtido</div></div>\n"}, {"title": "PCLD / EPCLD", "badge": "Perdas com clientes", "body": "\n<div class=\"mental\"><h3>Provisão / estimativa</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa com Perdas de Créditos</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – PCLD / EPCLD</div>\n<p>Conta retificadora do Ativo.</p></div>\n<div class=\"mental\"><h3>Baixa com provisão</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – PCLD / EPCLD</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Duplicatas a Receber</div></div>\n<div class=\"mental\"><h3>Baixa sem provisão</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa com Perdas de Créditos</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Duplicatas a Receber</div></div>\n"}, {"title": "DUPLICATAS DESCONTADAS", "badge": "Banco antecipa", "body": "\n<div class=\"mental\"><h3>Operação de desconto</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – Encargos Financeiros a Transcorrer</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Duplicatas Descontadas</div></div>\n<div class=\"mental\"><h3>Apropriação dos juros</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa de Juros</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Encargos Financeiros a Transcorrer</div></div>\n<div class=\"mental\"><h3>Depois do vencimento</h3>\n<p>Cliente paga: D – Duplicatas Descontadas / C – Clientes</p>\n<p>Cliente não paga: D – Duplicatas Descontadas / C – Banco</p>\n</div>\n"}, {"title": "EMPRÉSTIMOS E FINANCIAMENTOS", "badge": "Passivo", "body": "\n<div class=\"mental\"><h3>Contratação</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Empréstimos a Pagar</div></div>\n<div class=\"mental\"><h3>Operação com encargos a transcorrer</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – Encargos Financeiros a Transcorrer</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Empréstimos / Financiamentos a Pagar</div></div>\n<div class=\"mental\"><h3>Pagamento</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Empréstimos a Pagar</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa de Juros</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div></div>\n"}, {"title": "FOLHA DE PAGAMENTO", "badge": "Salários", "body": "\n<div class=\"mental\"><h3>Registro da folha</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa com Salários</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – Encargos Sociais</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Salários a Pagar</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – INSS / FGTS / IRRF a Recolher</div></div>\n<div class=\"mental\"><h3>Pagamento da folha</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Salários a Pagar</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div></div>\n<div class=\"mental\"><h3>Pagamento dentro do próprio mês</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa de Salários</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div></div>\n"}, {"title": "ENCARGOS, FÉRIAS E 13º", "badge": "Provisões", "body": "\n<div class=\"mental\"><h3>Recolhimento dos encargos</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – INSS / FGTS / IRRF a Recolher</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div></div>\n<div class=\"mental\"><h3>Provisão de férias</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa com Férias</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Provisão de Férias a Pagar</div></div>\n<div class=\"mental\"><h3>Provisão de 13º salário</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa com 13º Salário</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Provisão de 13º Salário a Pagar</div></div>\n<div class=\"mental\"><h3>Pagamento</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Provisão de Férias / 13º</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div></div>\n"}, {"title": "SEGUROS E DESPESAS ANTECIPADAS", "badge": "Ativo primeiro", "body": "\n<div class=\"mental\"><h3>Pagamento antecipado</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Seguro Antecipado / Despesa Paga Antecipadamente</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div>\n<p>Pagamento antes da utilização: fica no Ativo.</p></div>\n<div class=\"mental\"><h3>Apropriação da despesa</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Despesa de Seguros</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Seguro Antecipado / Despesa Paga Antecipadamente</div>\n<p>Rateio proporcional ao período de cobertura.</p></div>\n"}, {"title": "DESPESAS POR COMPETÊNCIA", "badge": "Recon ber</div></div>\n"}, {"title": "AÇÕES EM TESOURARIA", "badge": "Retificadora do PL", "body": "\n<div class=\"mental\"><h3>Aquisição</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Ações em Tesouraria</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa / Banco</div>\n<p>Conta retificadora do Patrimônio Líquido.</p></div>\n<div class=\"mental\"><h3>Venda com lucro</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Ações em Tesouraria</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Reserva de Capital</div></div>\n<div class=\"mental\"><h3>Venda com prejuízo</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Caixa / Banco</div>\n<div class=\"entry\"><span class=\"deb\">D</span> – Reservas de Lucros</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Ações em Tesouraria</div></div>\n"}, {"title": "DEPÓSITO BANCÁRIO", "badge": "Caixa para Banco", "body": "\n<div class=\"mental\">\n<h3>Transferência interna de recursos</h3>\n<div class=\"entry\"><span class=\"deb\">D</span> – Banco</div>\n<div class=\"entry\"><span class=\"cred\">C</span> – Caixa</div>\n<p>Não há receita nem despesa. Apenas troca entre contas do Ativo.</p>\n</div>\n"}, {"title": "DECORAÇÃO EXPRESS PARA O CFC", "badge": "Resumo final", "body": "\n<div class=\"macete\">Comprou → Estoque</div>\n<div class=\"macete\">Vendeu → Receita + CMV</div>\n<div class=\"macete\">Recebeu → Débito em Caixa/Banco</div>\n<div class=\"macete\">Pagou → Crédito em Caixa/Banco</div>\n<div class=\"macete\">Despesa → Débito</div>\n<div class=\"macete\">Receita → Crédito</div>\n<div class=\"macete\">Adiantamento a fornecedor → Ativo</div>\n<div class=\"macete\">Adiantamento de cliente → Passivo</div>\n<div class=\"macete\">PCLD / EPCLD → Retificadora do Ativo</div>\n<div class=\"macete\">Depreciação acumulada → Retificadora do Ativo</div>\n<div class=\"macete\">Ações em tesouraria → Retificadora do PL</div>\n"}, {"title": "FIM DO MAPA MENTAL", "badge": "Professor Moreira", "body": "\n<div class=\"final\">\n  <h2>LANÇAMENTOS CONTÁBEIS NA PALMA DA MÃO</h2>\n  <p>Revise pelas setas, volte quando precisar e reinicie para estudar novamente.</p>\n  <p><b>Curso de Contabilidade Professor Moreira</b></p>\n  <p>WhatsApp: (61) 98532-3574</p>\n</div>\n"}];
let current = Number(localStorage.getItem("lancamentos_mapa_current") || 0);
if (current < 0 || current >= slides.length) current = 0;

function render(){
  const s = slides[current];
  document.getElementById("card").innerHTML = `<span class="badge">${s.badge}</span><h2>${s.title}</h2>${s.body}`;
  document.getElementById("counter").textContent = `Tela ${current + 1} de ${slides.length}`;
  document.getElementById("progress").style.width = `${((current + 1) / slides.length) * 100}%`;
  localStorage.setItem("lancamentos_mapa_current", current);
  document.getElementById("card").scrollTop = 0;
}
function nextSlide(){
  if(current < slides.length - 1) {
    current++;
    render();
  }
}
function prevSlide(){
  if(current > 0) {
    current--;
    render();
  }
}
function restart(){
  current = 0;
  render();
}
document.addEventListener("keydown", function(e){
  if(e.key === "ArrowRight") nextSlide();
  if(e.key === "ArrowLeft") prevSlide();
  if(e.key === "Home") restart();
});
render();
</script>
